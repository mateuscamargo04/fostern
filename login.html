
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fostern — Log in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="img/png" href="img/Logo.jpeg">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
 
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #000;
    color: #fff;
    overflow: hidden;
  }
  @media (max-width: 768px) { body { overflow-y: auto; } }
 
  /* ── SPLIT LAYOUT ── */
  .split {
    display: grid;
    grid-template-columns: 60% 40%;
    min-height: 100vh;
  }
  @media (max-width: 768px) {
    .split { grid-template-columns: 1fr; }
    .left { display: none; }
    body { overflow-y: auto; }
  }
 
  /* ── LEFT PANEL ── */
  .left {
    position: relative;
    background: #000;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 52px 60px;
    overflow: hidden;
  }
 
  /* Canvas for particles */
  #canvas {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
 
  /* Soft ambient glow */
  .ambient {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    filter: blur(120px);
  }
  .amb1 {
    width: 500px; height: 500px;
    background: rgba(255,255,255,0.025);
    top: -100px; left: -80px;
    animation: drift1 18s ease-in-out infinite;
  }
  .amb2 {
    width: 350px; height: 350px;
    background: rgba(255,255,255,0.018);
    bottom: -60px; right: -40px;
    animation: drift2 22s ease-in-out infinite;
  }
  @keyframes drift1 {
    0%,100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(40px,30px) scale(1.05); }
    66% { transform: translate(-20px,50px) scale(0.97); }
  }
  @keyframes drift2 {
    0%,100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(-30px,-40px) scale(1.08); }
  }
 
  .left-content {
    position: relative; z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
 
  .left-logo {
    position: relative; z-index: 2;
    margin-bottom: auto;
  }
  .left-logo img { height: 26px; }
 
  .left-headline {
    font-size: clamp(2.6rem, 4.5vw, 4rem);
    font-weight: 700;
    line-height: 1.08;
    letter-spacing: -0.03em;
    color: #fff;
    margin-bottom: 20px;
  }
  .left-headline .dim {
    display: block;
    color: rgba(255,255,255,0.22);
    font-weight: 300;
  }
 
  .left-sub {
    font-size: 0.9rem;
    color: #5a5a5a;
    font-weight: 400;
    letter-spacing: 0.005em;
    margin-bottom: 64px;
  }
 
  .left-metrics {
    display: flex;
    gap: 40px;
    position: relative; z-index: 2;
  }
  .metric-item {}
  .metric-val {
    font-size: 1.5rem;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.02em;
    display: block;
    margin-bottom: 4px;
  }
  .metric-lbl {
    font-size: 0.72rem;
    color: #3a3a3a;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-weight: 500;
  }
 
  /* ── RIGHT PANEL ── */
  .right {
    background: #040404;
    border-left: 1px solid #111;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    position: relative;
  }
 
  /* ── LOGIN CARD ── */
  .card {
    width: 100%;
    max-width: 360px;
    opacity: 0;
    transform: translateY(20px);
    animation: card-in 0.65s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
  }
  @keyframes card-in {
    to { opacity: 1; transform: translateY(0); }
  }
 
  .card-logo-mobile {
    display: none;
    margin-bottom: 40px;
    text-align: center;
  }
  .card-logo-mobile img { height: 24px; }
  @media (max-width: 768px) { .card-logo-mobile { display: block; } }
 
  .card-title {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.025em;
    color: #fff;
    margin-bottom: 6px;
  }
  .card-sub {
    font-size: 0.82rem;
    color: #555;
    font-weight: 400;
    margin-bottom: 32px;
  }
 
  /* Google button */
  .btn-google {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: transparent;
    border: 1px solid #1f1f1f;
    color: #aaa;
    padding: 11px 16px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.84rem;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, transform 0.18s, box-shadow 0.2s;
    margin-bottom: 20px;
    letter-spacing: 0.005em;
  }
  .btn-google:hover {
    border-color: #2e2e2e;
    color: #ddd;
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(255,255,255,0.03);
  }
 
  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #141414;
  }
  .divider span {
    font-size: 0.72rem;
    color: #333;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
    white-space: nowrap;
  }
 
  /* Form */
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 0.75rem;
    font-weight: 500;
    color: #555;
    margin-bottom: 7px;
    letter-spacing: 0.025em;
  }
  .form-input {
    width: 100%;
    background: #0a0a0a;
    border: 1px solid #1a1a1a;
    color: #fff;
    padding: 11px 14px;
    border-radius: 9px;
    font-family: inherit;
    font-size: 0.875rem;
    font-weight: 400;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    -webkit-appearance: none;
  }
  .form-input::placeholder { color: #282828; }
  .form-input:hover { border-color: #252525; }
  .form-input:focus {
    border-color: rgba(255,255,255,0.5);
    background: #0d0d0d;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
  }
 
  /* Password wrapper */
  .pw-wrap { position: relative; }
  .pw-toggle {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: #333;
    font-family: inherit;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.2s;
    padding: 4px;
  }
  .pw-toggle:hover { color: #888; }
 
  /* Options row */
  .options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 18px 0 22px;
  }
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }
  .checkbox-row input[type=checkbox] {
    -webkit-appearance: none;
    appearance: none;
    width: 15px; height: 15px;
    border: 1px solid #222;
    border-radius: 4px;
    background: #0a0a0a;
    cursor: pointer;
    position: relative;
    transition: all 0.18s;
    flex-shrink: 0;
  }
  .checkbox-row input[type=checkbox]:checked {
    background: #fff;
    border-color: #fff;
  }
  .checkbox-row input[type=checkbox]:checked::after {
    content: '';
    position: absolute;
    top: 2px; left: 4px;
    width: 4px; height: 7px;
    border: 1.5px solid #000;
    border-top: none;
    border-left: none;
    transform: rotate(45deg);
  }
  .checkbox-label { font-size: 0.78rem; color: #444; font-weight: 400; }
  .forgot-link {
    font-size: 0.78rem;
    color: #444;
    text-decoration: none;
    transition: color 0.2s;
  }
  .forgot-link:hover { color: #888; }
 
  /* Primary button */
  .btn-login {
    width: 100%;
    background: #fff;
    color: #000;
    border: none;
    padding: 12px 16px;
    border-radius: 9px;
    font-family: inherit;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: -0.01em;
    transition: transform 0.18s cubic-bezier(0.22,1,0.36,1), box-shadow 0.18s, background 0.18s;
    margin-bottom: 22px;
    position: relative;
    overflow: hidden;
  }
  .btn-login::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(0,0,0,0);
    transition: background 0.18s;
  }
  .btn-login:hover {
    transform: translateY(-1px) scale(1.005);
    box-shadow: 0 6px 24px rgba(255,255,255,0.12);
  }
  .btn-login:active {
    transform: scale(0.99);
    box-shadow: none;
  }
 
  /* Signup */
  .signup-row {
    text-align: center;
    font-size: 0.78rem;
    color: #333;
  }
  .signup-row a {
    color: #888;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s;
    border-bottom: 1px solid transparent;
    padding-bottom: 1px;
  }
  .signup-row a:hover {
    color: #fff;
    border-bottom-color: #333;
  }
 
  /* Back link */
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #2a2a2a;
    text-decoration: none;
    font-size: 0.75rem;
    font-weight: 500;
    margin-bottom: 40px;
    transition: color 0.2s;
    letter-spacing: 0.01em;
  }
  .back-link:hover { color: #666; }
  .back-link svg { transition: transform 0.2s; }
  .back-link:hover svg { transform: translateX(-2px); }
 
  /* Input autofill override */
  input:-webkit-autofill,
  input:-webkit-autofill:hover,
  input:-webkit-autofill:focus {
    -webkit-box-shadow: 0 0 0 30px #0d0d0d inset !important;
    -webkit-text-fill-color: #fff !important;
    border-color: rgba(255,255,255,0.5) !important;
  }
 
  /* Fade in whole page */
  body { animation: body-in 0.4s ease forwards; }
  @keyframes body-in { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>
 
<div class="split">
  <!-- ══════════ LEFT ══════════ -->
  <div class="left">
    
 
    <div class="left-logo">
      <img src="img/Fostern.jpeg">
    </div>
 
    <div class="left-content">
      <h1 class="left-headline">
        Welcome back.
        <span class="dim">Continue your journey.</span>
      </h1>
      <p class="left-sub">Your future is built daily.</p>
    </div>
 
    <div class="left-metrics">
      <div class="metric-item">
        <span class="metric-val">2,400+</span>
        <span class="metric-lbl">Universities</span>
      </div>
      <div class="metric-item">
        <span class="metric-val">94%</span>
        <span class="metric-lbl">Accuracy</span>
      </div>
      <div class="metric-item">
        <span class="metric-val">12k</span>
        <span class="metric-lbl">Students</span>
      </div>
    </div>
  </div>
 
  <!-- ══════════ RIGHT ══════════ -->
  <div class="right">
    <div class="card">
 
      <div class="card-logo-mobile">
        
      </div>
 
      <a href="index.html" class="back-link">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M7.5 2L3.5 6L7.5 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back to home
      </a>
 
      <h2 class="card-title">Log in</h2>
      <p class="card-sub">Enter your credentials to continue.</p>
 
      <!-- Google -->
      <button class="btn-google" onclick="void(0)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
 
      <div class="divider"><span>or</span></div>
 
      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
 
      <!-- Password -->
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="pw-wrap">
          <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" style="padding-right:52px;"/>
          <button class="pw-toggle" id="pw-btn" onclick="togglePw()">Show</button>
        </div>
      </div>
 
      <!-- Options -->
      <div class="options">
        <label class="checkbox-row">
          <input type="checkbox" id="remember"/>
          <span class="checkbox-label">Remember me</span>
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>
 
      <!-- Login -->
      <button class="btn-login" id="loginBtn" onclick="handleLogin()">Log in</button>
 
      <!-- Signup -->
      <p class="signup-row">
        Don't have an account? <a href="create.html">Get started</a>
      </p>
    </div>
  </div>
</div>
 
<script>
// ── PASSWORD TOGGLE ─────────────────────────────────────────────
function togglePw() {
  const inp = document.getElementById('password');
  const btn = document.getElementById('pw-btn');
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.textContent = show ? 'Hide' : 'Show';
}
 
// ── LOGIN HANDLER (UI feedback) ─────────────────────────────────
function handleLogin() {
  const btn = document.getElementById('loginBtn');
  btn.textContent = 'Signing in…';
  btn.style.opacity = '0.6';
  btn.style.cursor = 'default';
  setTimeout(() => {
    btn.textContent = 'Log in';
    btn.style.opacity = '1';
    btn.style.cursor = 'pointer';
  }, 1800);
}
 
// ── PARTICLE CANVAS ─────────────────────────────────────────────
(function () {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let W, H, pts = [];
  const COUNT = 55;
 
  function resize() {
    W = canvas.width = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
  }
  resize();
  window.addEventListener('resize', () => { resize(); init(); });
 
  function Pt() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.18;
    this.vy = (Math.random() - 0.5) * 0.18;
    this.r = Math.random() * 0.9 + 0.3;
    this.a = Math.random() * 0.35 + 0.08;
  }
 
  function init() {
    pts = Array.from({ length: COUNT }, () => new Pt());
  }
  init();
 
  function tick() {
    ctx.clearRect(0, 0, W, H);
    pts.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${p.a})`;
      ctx.fill();
    });
    // connections
    for (let i = 0; i < pts.length; i++) {
      for (let j = i + 1; j < pts.length; j++) {
        const dx = pts[i].x - pts[j].x;
        const dy = pts[i].y - pts[j].y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < 130) {
          ctx.beginPath();
          ctx.moveTo(pts[i].x, pts[i].y);
          ctx.lineTo(pts[j].x, pts[j].y);
          ctx.strokeStyle = `rgba(255,255,255,${0.04 * (1 - d / 130)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(tick);
  }
  tick();
})();
 
// ── INPUT FOCUS ENHANCEMENT ─────────────────────────────────────
document.querySelectorAll('.form-input').forEach(inp => {
  inp.addEventListener('focus', () => {
    inp.parentElement.style.transform = 'translateY(-1px)';
    inp.parentElement.style.transition = 'transform 0.2s';
  });
  inp.addEventListener('blur', () => {
    inp.parentElement.style.transform = '';
  });
});
</script>
</body>
</html>
